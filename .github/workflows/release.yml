name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rustclaw-aarch64-apple-darwin
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: rustclaw-x86_64-apple-darwin
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rustclaw-x86_64-linux
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rustclaw-aarch64-linux
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rustclaw-x86_64-windows
            use_cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Install dependencies (Linux x86)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --features vendored-openssl

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # cross-compiled, use target strip or skip
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/rustclaw 2>/dev/null || true
          else
            strip target/${{ matrix.target }}/release/rustclaw || true
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release rustclaw

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/rustclaw.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | sed 's|  \./[^/]*/|  |' > ../checksums.txt
          cat ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            checksums.txt
          generate_release_notes: true
